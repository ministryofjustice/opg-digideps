services:
    _defaults:
        autowire: true
        autoconfigure: true

        bind:
            $fixtureParams: "%fixtures%"
            $fixturesEnabled: "%env(bool:FIXTURES_ENABLED)%"
            $workspace: "%workspace%"

    OPG\Digideps\Backend\Service\BruteForce\AttemptsInTimeChecker:
        public: true
        arguments: ["@predis"]
        calls:
            - [setRedisPrefix, ["test_ac_ret_code"]]
            # after 5 attempts in the last 10 minutes, return a different return code
            - [addTrigger, [5, 600]]
    OPG\Digideps\Backend\Service\BruteForce\AttemptsIncrementalWaitingChecker:
        public: true
        arguments: ["@predis"]
        calls:
            - [setRedisPrefix, ["test_ac_exception"]]
            # after 10 attempts, freeze for 10 minutes. used by AuthControllerTest::testBruteForceSameEmail
            - [addFreezingRule, [10, 600]]

    Tests\OPG\Digideps\Backend\Behat\:
        resource: "../tests/Behat/bootstrap/*"

    Tests\OPG\Digideps\Backend\Fixture\FixtureService:
        public: true
