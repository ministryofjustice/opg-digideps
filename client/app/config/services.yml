parameters:
  bad_pdf_keywords:
    - "AcroForm"
    - "JavaScript"
    - "Launch"
    - "RichMedia"
    - "XFA"
  # To avoid undefined variable errors at build time during clear-cache, we can define default values for env vars
  # At runtime Symfony will fetch the actual value from the environment
  env(AUDIT_LOG_GROUP_NAME): "dummy-build-time-value-overridden-at-runtime"

  # translation key must be present in report-assets.en.yml, dropdown.<value>
  asset_dropdown:
    - antiques
    - artwork
    - investment_bonds
    - jewellery
    - national_savings_certificates
    - premium_bonds
    - property
    - stocks_shares
    - unit_trusts
    - vehicles
    - assets_held_outside_england_and_wales
    - other_assets

  twig_components_extension:
    progress_bars:
      registration: [1, 2, 3]
      registration_admin: [1, 2]

  fallback_notify_base_uri: null

services:
  _defaults:
    autowire: true
    autoconfigure: true
    bind:
      $symfonyEnvironment: "%kernel.environment%"
      $symfonyDebug: "%kernel.debug%"
      Predis\ClientInterface: "@predis"
      $environment: "%env(ROLE)%"
      $hostedEnv: "%env(ENVIRONMENT)%"
      $projectDir: "%kernel.project_dir%"
      $sessionPrefix: "%session_prefix%"
      $workspace: "%workspace%"
      $fixturesEnabled: "%env(bool:FIXTURES_ENABLED)%"

  predis:
    class: Predis\Client
    arguments:
      - "%redis_dsn%"

  Symfony\Component\HttpFoundation\Session\Storage\Handler\RedisSessionHandler:
    arguments:
      $redis: "@predis"
      $options:
        prefix: "%workspace%_%session_prefix%"

  OPG\Digideps\Frontend\:
    resource: "../src/"
    exclude: "../src/{Entity,Event,Kernel.php}"

  OPG\Digideps\Frontend\Controller\:
    resource: "../src/Controller/"
    tags: [controller.service_arguments]

  OPG\Digideps\Frontend\Service\Redirector:
    class: OPG\Digideps\Frontend\Service\Redirector
    arguments:
      [
        "@security.token_storage",
        "@security.authorization_checker",
        "@router",
        "@request_stack",
        "%env(ROLE)%",
        '@OPG\Digideps\Frontend\Service\Client\Internal\ClientApi',
        "@logger",
      ]

  OPG\Digideps\Frontend\Service\HtmlToPdfGenerator:
    arguments: ["%htmltopdf_address%", 30]

  htmltopdf:
    alias: OPG\Digideps\Frontend\Service\HtmlToPdfGenerator

  # Disable autowiring
  OPG\Digideps\Frontend\Model\EmailAttachment: ~
  OPG\Digideps\Frontend\Service\DataImporter\CsvToArray: ~

  guzzle_api_gateway_client:
    class: GuzzleHttp\Client
    arguments:
      $config:
        timeout: 30
        allow_redirects: false

  OPG\Digideps\Frontend\Sync\Service\Client\Sirius\SiriusApiGatewayClient:
    class: OPG\Digideps\Frontend\Sync\Service\Client\Sirius\SiriusApiGatewayClient
    arguments:
      $httpClient: "@guzzle_api_gateway_client"
      $requestSigner: '@OPG\Digideps\Frontend\Service\AWS\RequestSigner'
      $baseUrl: "%env(SIRIUS_API_BASE_URI)%"
      $serializer: "@serializer"
      $logger: "@logger"

  OPG\Digideps\Frontend\Service\Client\Sirius\SiriusHealthCheckClient:
    class: OPG\Digideps\Frontend\Service\Client\Sirius\SiriusHealthCheckClient
    arguments:
      $httpClient: "@guzzle_api_gateway_client"
      $requestSigner: '@OPG\Digideps\Frontend\Service\AWS\RequestSigner'
      $baseUrl: "%env(SIRIUS_API_BASE_URI)%"

  OPG\Digideps\Frontend\Service\AWS\RequestSigner:
    class: OPG\Digideps\Frontend\Service\AWS\RequestSigner
    arguments:
      $credentialProvider: '@OPG\Digideps\Frontend\Service\AWS\DefaultCredentialProvider'
      $signer: '@OPG\Digideps\Frontend\Service\AWS\SignatureV4Signer'

  OPG\Digideps\Frontend\Service\Client\GovUK\BankHolidaysAPIClient:
    class: OPG\Digideps\Frontend\Service\Client\GovUK\BankHolidaysAPIClient
    arguments:
      $httpClient: '@GuzzleHttp\Client'
      $logger: "@logger"

  OPG\Digideps\Frontend\Service\AWS\DefaultCredentialProvider:
    class: OPG\Digideps\Frontend\Service\AWS\DefaultCredentialProvider

  OPG\Digideps\Frontend\Service\AWS\SignatureV4Signer:
    class: OPG\Digideps\Frontend\Service\AWS\SignatureV4Signer

  Aws\Ssm\SsmClient:
    arguments: ["%ssm_client_params%"]

  OPG\Digideps\Frontend\Service\ParameterStoreService:
    arguments:
      [
        '@Aws\Ssm\SsmClient',
        "%env(PARAMETER_PREFIX)%",
        "%env(FEATURE_FLAG_PREFIX)%",
      ]

  Aws\SecretsManager\SecretsManagerClient:
    arguments: ["%secrets_manager_client_params%"]

  OPG\Digideps\Frontend\Service\SecretManagerService:
    arguments:
      ['@Aws\SecretsManager\SecretsManagerClient', "%env(SECRETS_PREFIX)%"]

  OPG\Digideps\Frontend\Sync\Serializer\SiriusDocumentUploadNormalizer:
    tags: ["serializer.normalizer"]

  # Make optional availability services pullable
  OPG\Digideps\Frontend\Service\Availability\ClamAvAvailability:
    arguments: ["@guzzle_file_scanner_client"]

  OPG\Digideps\Frontend\Service\Availability\SiriusApiAvailability:
    arguments:
      ['@OPG\Digideps\Frontend\Service\Client\Sirius\SiriusHealthCheckClient']

  OPG\Digideps\Frontend\Service\Availability\HtmlToPdfAvailability:
    arguments: ['@OPG\Digideps\Frontend\Service\HtmlToPdfGenerator']

  OPG\Digideps\Frontend\Service\Availability\NotifyAvailability:
    arguments:
      $notifyClient: '@Alphagov\Notifications\Client'

  Aws\S3\S3ClientInterface:
    alias: Aws\S3\S3Client

  Aws\S3\S3Client:
    arguments: ["%s3_client_params%"]

  OPG\Digideps\Frontend\Service\File\Storage\S3Storage:
    arguments: ['@Aws\S3\S3Client', "%s3_bucket_name%", "@logger"]

  OPG\Digideps\Frontend\Command\DocumentRecoverCommand:
    class: OPG\Digideps\Frontend\Command\DocumentRecoverCommand
    arguments:
      $s3BucketName: "%s3_bucket_name%"

  guzzle_file_scanner_client:
    class: GuzzleHttp\Client
    arguments:
      $config:
        base_uri: "%file_scanner_url%"
        verify: "%file_scanner_sslverify%"
        proxy: ""
        debug: false
        headers:
          Content-Type: multipart-form-data
        version: "1.1"
        timeout: 10
        allow_redirects: false

  OPG\Digideps\Frontend\Service\File\Verifier\MultiFileFormUploadVerifier:
    calls:
      - [
          addVerifier,
          ['@OPG\Digideps\Frontend\Service\File\Verifier\ConstraintVerifier'],
        ]
      - [
          addVerifier,
          ['@OPG\Digideps\Frontend\Service\File\Verifier\ScannerVerifier'],
        ]

  OPG\Digideps\Frontend\Service\File\Scanner\ClamFileScanner:
    arguments: ["@guzzle_file_scanner_client", "@logger", "%bad_pdf_keywords%"]

  OPG\Digideps\Frontend\Sync\Service\DocumentSyncService:
    arguments:
      $siriusApiGatewayClient: '@OPG\Digideps\Frontend\Sync\Service\Client\Sirius\SiriusApiGatewayClient'
      $restClient: '@OPG\Digideps\Frontend\Service\Client\RestClient'
      $errorTranslator: '@OPG\Digideps\Frontend\Sync\Service\SiriusApiErrorTranslator'

  League\MimeTypeDetection\FinfoMimeTypeDetector:
    class: League\MimeTypeDetection\FinfoMimeTypeDetector

  Aws\CloudWatchLogs\CloudWatchLogsClient:
    class: Aws\CloudWatchLogs\CloudWatchLogsClient
    arguments: ["%cloudwatch_logs_client_params%"]

  OPG\Digideps\Frontend\Service\Audit\AwsAuditLogHandler:
    class: OPG\Digideps\Frontend\Service\Audit\AwsAuditLogHandler
    arguments:
      - '@Aws\CloudWatchLogs\CloudWatchLogsClient'
      - "%env(AUDIT_LOG_GROUP_NAME)%"

  OPG\Digideps\Frontend\Twig\AssetsExtension:
    public: false
    arguments: ["%kernel.project_dir%"]
    tags:
      - { name: twig.extension }

  OPG\Digideps\Frontend\Service\Mailer\MailFactory:
    arguments:
      $emailParams: "%email_params%"
      $baseURLs:
        front: "%env(NONADMIN_HOST)%"
        admin: "%env(ADMIN_HOST)%"

  OPG\Digideps\Frontend\Service\Mailer\MailSenderInterface: '@OPG\Digideps\Frontend\Service\Mailer\MailSender'

  Alphagov\Notifications\Client:
    class: Alphagov\Notifications\Client
    arguments:
      $config:
        httpClient: '@Http\Adapter\Guzzle7\Client'
        apiKey: "%env(NOTIFY_API_KEY)%"
        #                Setting the URI to null defaults to the uri defined in the package
        baseUrl: "%env(default:fallback_notify_base_uri:NOTIFY_API_BASE_URI)%"

  OPG\Digideps\Frontend\Service\Mailer\NotifyClientMock:
    class: OPG\Digideps\Frontend\Service\Mailer\NotifyClientMock
    arguments:
      $config:
        httpClient: '@Http\Adapter\Guzzle7\Client'
        apiKey: "%env(NOTIFY_API_KEY)%"
        #                Setting the URI to null defaults to the uri defined in the package
        baseUrl: "%env(default:fallback_notify_base_uri:NOTIFY_API_BASE_URI)%"
      $logger: "@logger"

  Http\Adapter\Guzzle7\Client:
    class: Http\Adapter\Guzzle7\Client

  OPG\Digideps\Frontend\Form\Report\Asset\AssetTypeTitle:
    arguments: ["%asset_dropdown%", "@translator", "report-assets"]
    tags:
      - { name: form.type }

  OPG\Digideps\Frontend\Validator\Constraints\EmailSameDomainValidator:
    calls:
      - [setTokenStorage, ["@security.token_storage"]]
    tags:
      - { name: validator.constraint_validator, alias: email_same_domain }

  GuzzleHttp\Client:
    arguments:
      $config:
        base_uri: "%api_base_url%"
        verify: false
        headers:
          Content-Type: application/json
        timeout: 20
        allow_redirects: false

  OPG\Digideps\Frontend\Service\Client\RestClientInterface:
    alias: OPG\Digideps\Frontend\Service\Client\RestClient

  OPG\Digideps\Frontend\Service\Client\RestClient:
    arguments:
      - "@service_container"
      - '@GuzzleHttp\Client'
      - '@OPG\Digideps\Frontend\Service\Client\TokenStorage\RedisStorage'
      - "@jms_serializer"
      - "@logger"
      - "%api_client_secret%"

  rest_client:
    alias: OPG\Digideps\Frontend\Service\Client\RestClient

  OPG\Digideps\Frontend\EventListener\SessionListener:
    arguments:
      ["@router", "@logger", { idleTimeout: "%session_expire_seconds%" }]
    tags:
      - {
          name: kernel.event_listener,
          event: kernel.request,
          method: onKernelRequest,
        }

  OPG\Digideps\Frontend\EventSubscriber\LogoutSubscriber:
    arguments:
      $tokenStorage: "@security.token_storage"
      $restClient: "@rest_client"
    tags: ["kernel.event_subscriber"]

  OPG\Digideps\Frontend\EventSubscriber\LoginSubscriber:
    class: OPG\Digideps\Frontend\EventSubscriber\LoginSubscriber
    tags: ["kernel.event_subscriber"]

  OPG\Digideps\Frontend\EventListener\ResponseNoCacheListener:
    tags:
      - {
          name: kernel.event_listener,
          event: kernel.response,
          method: onKernelResponse,
        }

  OPG\Digideps\Frontend\EventListener\UnauthorizedExceptionListener:
    tags:
      - {
          name: kernel.event_listener,
          event: kernel.exception,
          method: onKernelException,
        }

  OPG\Digideps\Frontend\EventListener\ForbiddenExceptionListener:
    tags:
      - {
          name: kernel.event_listener,
          event: kernel.exception,
          method: onKernelException,
        }

  OPG\Digideps\Frontend\Service\RequestIdLoggerProcessor:
    arguments: ["@service_container"]
    tags:
      - { name: monolog.processor, method: processRecord }

  security.validator.d_user_password:
    class: OPG\Digideps\Frontend\Validator\Constraints\DUserPasswordValidator
    arguments: ["@security.token_storage", "@rest_client"]
    tags:
      - {
          name: validator.constraint_validator,
          alias: security.validator.d_user_password,
        }

  OPG\Digideps\Frontend\Service\Client\TokenStorage\RedisStorage:
    arguments:
      $redis: "@predis"

  # Voter on User, used by PA area
  # http://symfony.com/doc/2.8/security/voters.html
  app.user_voter:
    class: OPG\Digideps\Frontend\Security\UserVoter
    arguments: ["@security.access.decision_manager"]
    tags:
      - { name: security.voter }
    # small performance boost
    public: false
  app.note_voter:
    class: OPG\Digideps\Frontend\Security\NoteVoter
    arguments: ["@security.access.decision_manager"]
    tags:
      - { name: security.voter }
    # small performance boost
    public: false
  app.client_contact_voter:
    class: OPG\Digideps\Frontend\Security\ClientContactVoter
    arguments: ["@security.access.decision_manager"]
    tags:
      - { name: security.voter }
    # small performance boost
    public: false
  app.document_voter:
    class: OPG\Digideps\Frontend\Security\DocumentVoter
    arguments: ["@security.access.decision_manager"]
    tags:
      - { name: security.voter }
    # small performance boost
    public: false

  OPG\Digideps\Frontend\Twig\FormFieldsExtension:
    class: OPG\Digideps\Frontend\Twig\FormFieldsExtension
    arguments:
      $environment: "@twig"

  OPG\Digideps\Frontend\Twig\ComponentsExtension:
    class: OPG\Digideps\Frontend\Twig\ComponentsExtension

  # Logtash formatter for Kibana
  logstash_formatter:
    class: Monolog\Formatter\LogstashFormatter
    arguments: ["application.client", null, null, "", 1]

  opg_json_formatter:
    class: OPG\Digideps\Common\Logger\OpgJsonFormatter

  opg_line_formatter:
    class: OPG\Digideps\Common\Logger\OpgLineFormatter

  line_formatter:
    class: Monolog\Formatter\LineFormatter

  uuid_normalizer:
    class: GBProd\UuidNormalizer\UuidNormalizer
    tags:
      - { name: serializer.normalizer }

  uuid_denormalizer:
    class: GBProd\UuidNormalizer\UuidDenormalizer
    tags:
      - { name: serializer.denormalizer }

  OPG\Digideps\Frontend\Command\CheckCSVUploadedCommand:
    class: OPG\Digideps\Frontend\Command\CheckCSVUploadedCommand
    arguments:
      $auditLogGroupName: "%env(AUDIT_LOG_GROUP_NAME)%"

  OPG\Digideps\Frontend\EventListener\NotFoundExceptionListener:
    arguments:
      $logger: "@logger"
      $environment: "@twig"
    tags:
      - { name: kernel.event_listener, event: kernel.exception, priority: 100 }
