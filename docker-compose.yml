## Define all volumes in docker-compose.override.yml so this file can be used in CI
services:
  resources:
    image: opg-digideps-resources
    build:
      context: .
      dockerfile: ./client/docker/resources/Dockerfile
    environment:
      NODE_ENV: production
    entrypoint: sh -c "npm run build"

  load-balancer:
    container_name: opg-digideps-loadbalancer
    build:
      context: local-resources/local-load-balancer
    depends_on:
      - frontend-webserver
      - admin-webserver
    ports:
      - 443:443

  frontend-webserver:
    container_name: opg-digideps-frontend-webserver
    build:
      context: .
      dockerfile: ./client/docker/web/Dockerfile
      args:
        APP_HOST: frontend-app
        APP_PORT: 9000
    ports:
      - 8070:80
    depends_on:
      - frontend-app
    healthcheck:
      test: /opt/scripts/health-check.sh
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: always

  frontend-app:
    container_name: opg-digideps-frontend-app
    build:
      context: .
      dockerfile: ./client/docker/app/Dockerfile
      target: devtools
      args:
        REQUIRE_XDEBUG: ${REQUIRE_XDEBUG_CLIENT} # set REQUIRE_XDEBUG_CLIENT=1 in .env to install Xdebug.
        XDEBUG_IDEKEY_CLIENT: ${XDEBUG_IDEKEY_CLIENT}
        LOCAL_RESOURCES: true
    depends_on:
      - resources
      - api-webserver
      - redis-frontend
      - htmltopdf
      - localstack
      - mock-notify-api
      - file-scanner-rest
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-0}
    env_file:
      - ./client/app/frontend.env
    restart: always

  admin-webserver:
    container_name: opg-digideps-admin-webserver
    build:
      context: .
      dockerfile: ./client/docker/web/Dockerfile
      args:
        APP_HOST: admin-app
        APP_PORT: 9000
    ports:
      - 8071:80
    depends_on:
      - admin-app
    healthcheck:
      test: /opt/scripts/health-check.sh
      interval: 30s
      timeout: 30s
      retries: 3
      start_period: 60s
    restart: always

  admin-app:
    container_name: opg-digideps-admin-app
    build:
      context: .
      dockerfile: ./client/docker/app/Dockerfile
      target: devtools
      args:
        REQUIRE_XDEBUG: ${REQUIRE_XDEBUG_CLIENT} # set REQUIRE_XDEBUG_CLIENT=1 in .env to install Xdebug
        XDEBUG_IDEKEY_CLIENT: ${XDEBUG_IDEKEY_CLIENT}
        LOCAL_RESOURCES: true
    depends_on:
      - api-webserver
      - redis-frontend
      - htmltopdf
      - localstack
      - mock-notify-api
      - resources
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-0}
    env_file:
      - ./client/app/frontend.env
      - ./client/app/admin.env
    restart: always

  api-webserver:
    container_name: opg-digideps-api-webserver
    build:
      context: .
      dockerfile: ./api/docker/web/Dockerfile
      args:
        APP_HOST: api-app
        APP_PORT: 9000
    ports:
      - 8072:80
    depends_on:
      - api-app
    restart: always

  api-app:
    container_name: opg-digideps-api-app
    build:
      context: .
      dockerfile: ./api/docker/app/Dockerfile
      target: devtools
      args:
        REQUIRE_XDEBUG: ${REQUIRE_XDEBUG_API} # set REQUIRE_XDEBUG_API=1 in .env to install Xdebug
        XDEBUG_IDEKEY_API: ${XDEBUG_IDEKEY_API}
        LOCAL_RESOURCES: true
    depends_on:
      - postgres
      - redis-api
      - localstack
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-0}
      WORKSPACE: local
    env_file:
      - ./api/app/api.env
      - ./api/app/tests/Behat/test.env
    restart: always

  htmltopdf:
    build:
      context: .
      dockerfile: ./htmltopdf/Dockerfile
    depends_on:
      - resources
    ports:
      - 8090:8080
    restart: always

  postgres:
    container_name: opg-digideps-postgres
    image: postgres:14.21@sha256:b964c3211689ffe50cc65235ea338717520954dcf6ecd4d76bf887eba3cbc91f
    ports:
      - 5432:5432
    env_file:
      - ./api/app/postgres.env
    restart: always

  redis-frontend:
    image: redis:6.2.18@sha256:a1407ab0d0dd15f4fdaad5d4cdc121830497af4be27027a8423fff823c4fc3e0
    restart: always

  redis-api:
    image: redis:6.2.18@sha256:a1407ab0d0dd15f4fdaad5d4cdc121830497af4be27027a8423fff823c4fc3e0
    restart: always

  file-scanner-rest:
    build:
      context: .
      dockerfile: ./file-scanner/Dockerfile
    ports:
      - 8085:8080

  orchestration:
    build: ./orchestration
    depends_on:
      - localstack
      - postgres
    env_file:
      - orchestration/orchestration.env

  aws:
    image: infrastructureascode/aws-cli@sha256:891db48126b0f044f06263521acbd611dfa31aa9e549fed23b0b3ef890082b36
    environment:
      - AWS_ACCESS_KEY_ID=foo
      - AWS_SECRET_ACCESS_KEY=bar
    working_dir: /app
    depends_on:
      - localstack

  localstack:
    build:
      context: .
      dockerfile: local-resources/localstack/Dockerfile
    ports:
      - "4566-4583:4566-4583"
    environment:
      - SERVICES=s3,ssm,logs,secretsmanager,lambda
      - DATA_DIR=/tmp/localstack/data
      - DEFAULT_REGION=eu-west-1
      - USE_SINGLE_REGION=1
      - DEBUG=1
    healthcheck:
      test: /scripts/wait/healthcheck.sh
      interval: 20s
      timeout: 30s
      retries: 50

  wait-for-it:
    build: ./wait-for-it

  mock-sirius-integration:
    build:
      context: .
      dockerfile: ./mock-sirius/Dockerfile
    ports:
      - 6060:8080
    environment:
      - OPENAPI_MOCK_SPECIFICATION_URL=/app/deputy-reporting-openapi.yml

  mock-notify-api:
    image: stoplight/prism:5.15.6@sha256:6640f7d73f18091fc9aaa73647de27ddb8b178615aabfc3ff30c5cb500f387a6
    ports:
      - 4010:4010
    command:
      - mock
      - /tmp/govuk-notifications.yaml
      - -h
      - 0.0.0.0
      - --dynamic

  composer:
    image: composer:2.9.4@sha256:22a95bd2bc3cf6ff19550a246208138d35f0015602db3d67dc6841945324acc1
    command: ["install"]

  custom-sql-query:
    image: custom-sql-query:latest
    build:
      context: lambdas/functions/custom_sql_query
      dockerfile: Dockerfile
    ports:
      - 9070:8080
    depends_on:
      - localstack
      - postgres
    volumes:
      - ./lambdas/.aws-lambda-rie:/aws-lambda
      - ./lambdas/functions/custom_sql_query/app:/function/app
    environment:
      ENVIRONMENT: local
      DATABASE_HOSTNAME: postgres
      DATABASE_NAME: api
      DATABASE_USERNAME: custom_sql_user
      DATABASE_PORT: 5432
    entrypoint: /aws-lambda/aws-lambda-rie /usr/local/bin/python -m awslambdaric app.sql_query.lambda_handler

  client-unit-tests:
    container_name: client-unit-tests-app
    image: frontend-unit-tests:latest
    build:
      dockerfile: client/docker/app/Dockerfile
      context: .
      target: devtools
      args:
        REQUIRE_XDEBUG: ${REQUIRE_XDEBUG_CLIENT} # set REQUIRE_XDEBUG_CLIENT=1 in .env to install Xdebug
        LOCAL_RESOURCES: true
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-0}
      AWS_ACCESS_KEY_ID: aFakeSecretAccessKeyId
      AWS_SECRET_ACCESS_KEY: aFakeSecretAccessKey
      AWS_SESSION_TOKEN: fakeValue
    env_file:
      - ./client/app/frontend.env
    volumes:
      - ./client/app/tests/Unit/coverage:/var/www/tests/Unit/coverage
      - ./build/coverage-client:/var/www/build/coverage-client
    command: sleep infinity

  api-unit-tests:
    container_name: api-unit-tests
    image: api-unit-tests:latest
    build:
      context: .
      dockerfile: api/docker/app/Dockerfile
      target: devtools
      args:
        REQUIRE_XDEBUG: ${REQUIRE_XDEBUG_API} # set REQUIRE_XDEBUG_API=1 in .env to install Xdebug
        XDEBUG_IDEKEY_API: ${XDEBUG_IDEKEY_API}
        LOCAL_RESOURCES: true
    environment:
      AWS_ACCESS_KEY_ID: aFakeSecretAccessKeyId
      AWS_SECRET_ACCESS_KEY: aFakeSecretAccessKey
      AWS_SESSION_TOKEN: fakeValue
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-0}
    env_file:
      - ./api/app/api.env
      - ./api/app/tests/Behat/test.env
    volumes:
      - ./api/app/tests/coverage:/var/www/tests/coverage
      - ./build/coverage-api:/var/www/build/coverage-api
      - ./build/.phpunit.api-integration.cache:/var/www/build/.phpunit.api-integration.cache
      - ./build/.phpunit.api-unit.cache:/var/www/build/.phpunit.api-unit.cache
    command: sleep infinity

  api-integration-tests:
    container_name: api-integration-tests
    image: api-integration-tests:latest
    build:
      context: .
      dockerfile: api/docker/app/Dockerfile
      target: devtools
      args:
        REQUIRE_XDEBUG: ${REQUIRE_XDEBUG_API} # set REQUIRE_XDEBUG_API=1 in .env to install Xdebug
        XDEBUG_IDEKEY_API: ${XDEBUG_IDEKEY_API}
        LOCAL_RESOURCES: true
    depends_on:
      postgres:
        condition: service_started
      redis-api:
        condition: service_started
      localstack:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: aFakeSecretAccessKeyId
      AWS_SECRET_ACCESS_KEY: aFakeSecretAccessKey
      AWS_SESSION_TOKEN: fakeValue
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-0}
    env_file:
      - ./api/app/api.env
      - ./api/app/tests/Behat/test.env
    volumes:
      - ./api/app/tests/coverage:/var/www/tests/coverage
      - ./build/coverage-api:/var/www/build/coverage-api
      - ./build/.phpunit.api-integration.cache:/var/www/build/.phpunit.api-integration.cache
      - ./build/.phpunit.api-unit.cache:/var/www/build/.phpunit.api-unit.cache

  end-to-end-tests:
    build:
      dockerfile: api/docker/app/Dockerfile
      context: .
      target: devtools
      args:
        LOCAL_RESOURCES: true
    depends_on:
      localstack:
        condition: service_healthy
      mock-sirius-integration:
        condition: service_started
    environment:
      AWS_ACCESS_KEY_ID: aFakeSecretAccessKeyId
      AWS_SECRET_ACCESS_KEY: aFakeSecretAccessKey
      AWS_SESSION_TOKEN: fakeValue
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-0}
    volumes:
      - ./api/app/tests/Behat/snapshots:/tmp/html

  node-js:
    image: opg-digideps-resources
    build:
      context: .
      dockerfile: ./client/docker/resources/Dockerfile
      target: testing
    working_dir: /app
    environment:
      NODE_ENV: production

  composer-common-phpunit:
    build:
      context: ./common
    command: tests:unit

  composer-common-phpstan:
    build:
      context: ./common
    command: lint:phpstan
