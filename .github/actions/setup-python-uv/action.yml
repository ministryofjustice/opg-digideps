name: "Setup Python with uv"
description: "Install uv and pinned Python dependencies"

inputs:
  requirements_file:
    description: "Path to requirements.txt"
    required: true
  working_directory:
    description: "Optional working directory"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Install uv
      shell: bash
      run: python -m pip install uv==0.11.3

    - name: Install requirements
      shell: bash
      run: uv pip install --system -r "${{ inputs.requirements_file }}"
      working-directory: ${{ inputs.working_directory }}
