name: "[Scheduled] Cleanup PR Workspaces"

on:
  schedule:
    # 9pm every day except Sundays
    - cron: "0 21 * * 0-6"

permissions:
  id-token: write
  contents: read
  security-events: none
  pull-requests: none
  actions: none
  checks: none
  deployments: none
  issues: none
  packages: none
  repository-projects: none
  statuses: none

jobs:
  terraform_environment_cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: terraform_version
        name: get terraform version
        uses: ministryofjustice/opg-github-actions/actions/terraform-version@b8868247a908f74fafe1905701391580575a6d35 # v4.3.10
        with:
          terraform_directory: terraform/environment

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: ${{ steps.terraform_version.outputs.version }}
          terraform_wrapper: false

      - name: install workspace manager
        run: |
          wget "https://github.com/ministryofjustice/opg-terraform-workspace-manager/releases/download/v0.3.3/opg-terraform-workspace-manager_Linux_x86_64.tar.gz" -O "$HOME/terraform-workspace-manager.tar.gz"
          sudo tar -xvf "$HOME/terraform-workspace-manager.tar.gz" -C /usr/local/bin
          sudo chmod +x /usr/local/bin/terraform-workspace-manager

      - name: configure AWS credentials for workspace manager
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.DEVELOPMENT_ACCOUNT }}:role/digideps-gh-actions-workspace-cleanup
          role-session-name: github-actions-terraform
          role-duration-seconds: 900
          aws-region: eu-west-1

      - name: Get ephemeral workspaces to clean up
        id: get_workspaces
        run: |
          WORKSPACES="$(terraform-workspace-manager \
            -protected-workspaces=true \
            -aws-account-id=${{ vars.DEVELOPMENT_ACCOUNT }} \
            -aws-iam-role=digideps-ci \
            -assume-role=false)"
          echo "workspaces=${WORKSPACES}" >> "$GITHUB_OUTPUT"
        working-directory: terraform/environment

      - id: deploy-key
        uses: "ministryofjustice/opg-github-actions/actions/github-deploy-key@a2907c7c7be94301c965ace76a2cfa407ad6fc88" # v4.6.0
        with:
          deploy_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

      - name: configure AWS credentials for terraform
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.IDENTITY_ACCOUNT }}:role/oidc-digideps-development
          role-session-name: github-actions-terraform
          role-duration-seconds: 7400
          aws-region: eu-west-1

      - name: terraform init
        run: terraform init -input=false
        working-directory: terraform/environment

      - name: Clean up ephemeral environments
        env:
          WC_WORKSPACES: ${{ steps.get_workspaces.outputs.workspaces }}
        run: |
          unset TF_WORKSPACE
          ./scripts/workspace_cleanup.sh "${WC_WORKSPACES}"
        working-directory: terraform/environment

      - name: SLSA
        uses: ministryofjustice/devsecops-actions/sca/slsa@4cd163be7859cd130800d6719d925318826038ea
        with:
          requirements-file: scripts/pipeline/cleanup_task_definitions/requirements.txt

      - name: Install requirements
        run: pip install -r scripts/pipeline/cleanup_task_definitions/requirements.txt

      - name: clean up old task definitions
        env:
          REGION: eu-west-1
        run: python cleanup_task_definitions.py
        working-directory: scripts/pipeline/cleanup_task_definitions

      - name: Unset AWS variables
        if: always()
        run: |
          {
            echo "AWS_SECRET_ACCESS_KEY="
            echo "AWS_ACCESS_KEY_ID="
            echo "AWS_SESSION_TOKEN="
          } >> "$GITHUB_ENV"

  slack_notify_failure:
    name: notify of failure
    uses: ./.github/workflows/_slack-notification.yml
    if: ${{ failure() }}
    needs:
      - terraform_environment_cleanup
    with:
      success: no
      branch: main
      account: ${{ vars.PREPRODUCTION_ACCOUNT }}
      scheduled_task: "Environment Cleanup"
