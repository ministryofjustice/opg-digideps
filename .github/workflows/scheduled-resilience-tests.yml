name: "[Scheduled] Resilience Tests"

on:
  schedule:
    # 11am every Sunday
    - cron: "0 11 * * 0"

permissions:
  id-token: write
  contents: read
  security-events: none
  pull-requests: none
  actions: none
  checks: none
  deployments: none
  issues: none
  packages: none
  repository-projects: none
  statuses: none

jobs:
  scale_services_up:
    name: scale up staging services
    uses: ./.github/workflows/_scale-services.yml
    with:
      replicas: 3
      acu: 8
      account_id: ${{ vars.DEVELOPMENT_ACCOUNT }}
      workspace: staging

  resilience_tests_staging:
    name: resilience tests on staging
    uses: ./.github/workflows/_run-task.yml
    needs:
      - scale_services_up
    with:
      workspace: staging
      account_id: ${{ vars.DEVELOPMENT_ACCOUNT }}
      account_name: development
      task_name: "resilience_tests"
      timeout: "3600"
    secrets:
      ssh_private_key: ${{ secrets.SSH_PRIVATE_KEY_ALLOW_LIST_REPOSITORY }}

  scale_services_down:
    if: always()
    name: scale down staging services
    uses: ./.github/workflows/_scale-services.yml
    needs:
      - resilience_tests_staging
    with:
      replicas: 1
      acu: 4
      account_id: ${{ vars.DEVELOPMENT_ACCOUNT }}
      workspace: staging
