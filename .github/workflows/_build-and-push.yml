name: "[Docker] Build and Push Images"

defaults:
  run:
    shell: bash

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Name of the branch doing the build"
        required: true
        type: string
      tag:
        description: "Tag for docker image"
        required: false
        default: "latest"
        type: string
      push_to_ecr:
        description: "Whether to push to ECR"
        required: false
        default: true
        type: boolean
    secrets:
      snyk_token:
        required: true

jobs:
  prewarm_snyk_scanner:
    strategy:
      fail-fast: false
      matrix:
        runs_on:
          - "ubuntu-24.04-arm"
          - "ubuntu-latest"

    runs-on: ${{ matrix.runs_on }}

    outputs:
      opg_actions_ref: ${{ steps.opg_actions_ref.outputs.ref }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: get opg github actions ref
        id: opg_actions_ref
        run: |
          OPG_GITHUB_ACTIONS_LINE="$(grep -m 1 '^[[:space:]]*uses: ministryofjustice/opg-github-actions/actions/snyk-scan@' .github/workflows/_build-and-push.yml)"

          OPG_GITHUB_ACTIONS_REF="$(echo "${OPG_GITHUB_ACTIONS_LINE}" | cut -d '@' -f 2 | awk '{print $1}')"

          echo "ref=${OPG_GITHUB_ACTIONS_REF}" >> "$GITHUB_OUTPUT"

          echo "Using OPG GitHub Actions ref: ${OPG_GITHUB_ACTIONS_REF}"

      - name: cache snyk scanner image
        id: cache-snyk-scanner
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/snyk-scanner-cache
          key: snyk-scanner-image-${{ matrix.runs_on }}-${{ steps.opg_actions_ref.outputs.ref }}

      - name: configure OIDC AWS credentials for ECR pull
        if: steps.cache-snyk-scanner.outputs.cache-hit != 'true'
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT }}:role/digideps-gh-actions-ecr-pull
          role-session-name: github-actions-ecr-pull
          role-duration-seconds: 900
          aws-region: eu-west-1

      - name: login to ECR for snyk scanner pull
        if: steps.cache-snyk-scanner.outputs.cache-hit != 'true'
        uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        with:
          registries: ${{ vars.MANAGEMENT_ACCOUNT }}
          mask-password: "true"

      - name: pull and save snyk scanner image
        if: steps.cache-snyk-scanner.outputs.cache-hit != 'true'
        env:
          OPG_GITHUB_ACTIONS_REF: ${{ steps.opg_actions_ref.outputs.ref }}
        run: |
          git clone https://github.com/ministryofjustice/opg-github-actions.git /tmp/opg-github-actions

          cd /tmp/opg-github-actions

          git checkout "${OPG_GITHUB_ACTIONS_REF}"

          docker compose -f "/tmp/opg-github-actions/docker-compose.yml" pull snyk

          mkdir -p /tmp/snyk-scanner-cache

          SNYK_IMAGE="$(docker compose -f "/tmp/opg-github-actions/docker-compose.yml" config | awk '$1 == "image:" {print $2; exit}')"

          echo "Using Snyk image: ${SNYK_IMAGE}"

          docker save -o /tmp/snyk-scanner-cache/snyk-scanner.tar "${SNYK_IMAGE}"

  docker_build_scan_push:
    needs: prewarm_snyk_scanner
    strategy:
      fail-fast: false
      matrix:
        include:
          - svc_name: "client-webserver"
            sub_folder: "."
            docker_file: "client/docker/web/Dockerfile"
            platform: "arm64"
            target: ""
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "client"
            sub_folder: "."
            docker_file: "client/docker/app/Dockerfile"
            platform: "arm64"
            target: "--target runtime"
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "client-devtools"
            sub_folder: "."
            docker_file: "client/docker/app/Dockerfile"
            platform: "arm64"
            target: "--target devtools"
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "api-webserver"
            sub_folder: "."
            docker_file: "api/docker/web/Dockerfile"
            platform: "arm64"
            target: ""
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "api"
            sub_folder: "."
            docker_file: "api/docker/app/Dockerfile"
            platform: "arm64"
            target: "--target runtime"
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "api-devtools"
            sub_folder: "."
            docker_file: "api/docker/app/Dockerfile"
            platform: "arm64"
            target: "--target devtools"
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "sync"
            sub_folder: "orchestration"
            docker_file: "Dockerfile"
            platform: "arm64"
            target: ""
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "htmltopdf"
            sub_folder: "."
            docker_file: "htmltopdf/Dockerfile"
            platform: "arm64"
            target: ""
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "file-scanner"
            sub_folder: "."
            docker_file: "file-scanner/Dockerfile"
            platform: "arm64"
            target: ""
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "dr-backup"
            sub_folder: "disaster-recovery/backup"
            docker_file: "Dockerfile"
            platform: "arm64"
            target: ""
            runs_on: "ubuntu-24.04-arm"

          - svc_name: "custom-sql-lambda"
            sub_folder: "lambdas/functions/custom_sql_query"
            docker_file: "Dockerfile"
            platform: "amd64"
            runs_on: "ubuntu-latest"

          - svc_name: "mock-sirius"
            sub_folder: "mock-sirius"
            docker_file: "Dockerfile"
            platform: "amd64"
            runs_on: "ubuntu-latest"

    runs-on: ${{ matrix.runs_on }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: set up docker buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        id: buildx_setup
        with:
          version: v0.15.1
          platforms: linux/${{ matrix.platform }}

      - name: export dates
        id: cache-dates
        run: |
          echo "cache_date_today=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          echo "cache_date_yesterday=$(date -d 'yesterday' +'%Y%m%d')" >> "$GITHUB_OUTPUT"

      - name: cache docker layers
        id: cache-docker
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/.buildx-cache
          key: ${{ matrix.svc_name }}-${{ inputs.branch_name }}-${{ steps.cache-dates.outputs.cache_date_today }}-${{ github.sha }}
          restore-keys: |
            ${{ matrix.svc_name }}-${{ inputs.branch_name }}-${{ steps.cache-dates.outputs.cache_date_today }}
            ${{ matrix.svc_name }}-main-${{ steps.cache-dates.outputs.cache_date_today }}
            ${{ matrix.svc_name }}-${{ inputs.branch_name }}-${{ steps.cache-dates.outputs.cache_date_yesterday }}
            ${{ matrix.svc_name }}-main-${{ steps.cache-dates.outputs.cache_date_yesterday }}

      - name: download resources artifact
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: web-distribution
          path: client/resources/public
        if: |
          (matrix.svc_name == 'client' || matrix.svc_name == 'client-webserver' || matrix.svc_name == 'htmltopdf')

      - name: build docker image
        env:
          IMAGE_NAME: ${{ matrix.svc_name }}
          DOCKERFILE: ${{ matrix.docker_file }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          PLATFORM: ${{ matrix.platform }}
          TAG: ${{ inputs.tag }}
          TARGET_STAGE: ${{ matrix.target }}
        run: |
          if [ "${BRANCH_NAME}" == "main" ]; then
            docker buildx build \
            -f "${DOCKERFILE}" \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --platform "linux/${PLATFORM}" ${TARGET_STAGE:+${TARGET_STAGE}} \
            --load \
            --build-arg "PLATFORM=${PLATFORM}" \
            --build-arg "TAG=${TAG}" \
            --tag "${IMAGE_NAME}:latest" \
            --output type=docker \
            .
          else
            docker buildx build \
            -f "${DOCKERFILE}" \
            --cache-from=type=local,src=/tmp/.buildx-cache \
            --cache-to=type=local,dest=/tmp/.buildx-cache-new \
            --platform "linux/${PLATFORM}" ${TARGET_STAGE:+${TARGET_STAGE}} \
            --tag "${IMAGE_NAME}:latest" \
            --load \
            --build-arg "PLATFORM=${PLATFORM}" \
            --build-arg "TAG=${TAG}" \
            --output type=docker \
            .
          fi
        working-directory: ${{ matrix.sub_folder }}

      - name: calculate docker image checksum
        id: image_checksum
        env:
          IMAGE_NAME: ${{ matrix.svc_name }}
          PLATFORM: ${{ matrix.platform }}
          TARGET_STAGE: ${{ matrix.target }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          CHECKSUM="$(
            {
              docker image inspect "${IMAGE_NAME}:latest" \
                --format '{{json .RootFS.Layers}}'
              printf '%s\n' "${PLATFORM}"
              printf '%s\n' "${TARGET_STAGE}"
            } | sha256sum | awk '{print $1}'
          )"

          echo "checksum_tag=checksum-${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "branch_checksum_tag=${BRANCH_NAME}-checksum-${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "Image checksum tag: checksum-${CHECKSUM}"
          echo "Branch checksum tag: ${BRANCH_NAME}-checksum-${CHECKSUM}"

      - name: configure OIDC AWS credentials for ECR pull
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT }}:role/digideps-gh-actions-ecr-pull
          role-session-name: github-actions-ecr-pull
          role-duration-seconds: 900
          aws-region: eu-west-1

      - uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        id: login_ecr_pull
        with:
          registries: ${{ vars.MANAGEMENT_ACCOUNT }}
          mask-password: "true"

      - name: check existing scanned image
        id: existing_image
        env:
          IMAGE_NAME: ${{ matrix.svc_name }}
          CHECKSUM_TAG: ${{ steps.image_checksum.outputs.checksum_tag }}
          BRANCH_CHECKSUM_TAG: ${{ steps.image_checksum.outputs.branch_checksum_tag }}
        run: |
          BRANCH_IMAGE_COUNT="$(aws ecr batch-get-image \
            --repository-name "digideps/${IMAGE_NAME}" \
            --image-ids imageTag="${BRANCH_CHECKSUM_TAG}" \
            --query 'length(images)' \
            --output text)"

          if [ "${BRANCH_IMAGE_COUNT}" = "1" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "source_tag=${BRANCH_CHECKSUM_TAG}" >> "$GITHUB_OUTPUT"
            echo "Existing scanned image found for this branch: ${BRANCH_CHECKSUM_TAG}"
            exit 0
          fi

          SHARED_IMAGE_COUNT="$(aws ecr batch-get-image \
            --repository-name "digideps/${IMAGE_NAME}" \
            --image-ids imageTag="${CHECKSUM_TAG}" \
            --query 'length(images)' \
            --output text)"

          if [ "${SHARED_IMAGE_COUNT}" = "1" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "source_tag=${CHECKSUM_TAG}" >> "$GITHUB_OUTPUT"
            echo "Existing scanned image found from another branch: ${CHECKSUM_TAG}"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "source_tag=" >> "$GITHUB_OUTPUT"
            echo "No existing scanned image found"
          fi

      - name: check daily snyk scan
        id: daily_snyk
        env:
          IMAGE_NAME: ${{ matrix.svc_name }}
          CHECKSUM_TAG: ${{ steps.image_checksum.outputs.checksum_tag }}
        run: |
          TODAY="$(date +'%Y%m%d')"
          OLD_FILE="/tmp/.buildx-cache/snyk-last-run-${CHECKSUM_TAG}.txt"
          NEW_FILE="/tmp/.buildx-cache-new/snyk-last-run-${CHECKSUM_TAG}.txt"

          mkdir -p /tmp/.buildx-cache-new

          if [ -f "${OLD_FILE}" ]; then
            LAST_RUN="$(cat "${OLD_FILE}")"
          else
            LAST_RUN=""
          fi

          echo "${TODAY}" > "${NEW_FILE}"

          echo "Image: ${IMAGE_NAME}"
          echo "Checksum: ${CHECKSUM_TAG}"

          if [ "${LAST_RUN}" != "${TODAY}" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Last Snyk run was '${LAST_RUN}'. Running Snyk scan today for ${IMAGE_NAME} (${CHECKSUM_TAG})"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Snyk already ran today for ${IMAGE_NAME} (${CHECKSUM_TAG})"
          fi

      - name: restore snyk scanner image cache
        if: matrix.svc_name != 'mock-sirius' && (steps.existing_image.outputs.exists != 'true' || steps.daily_snyk.outputs.run == 'true' || inputs.branch_name == 'staging')
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/snyk-scanner-cache
          key: snyk-scanner-image-${{ matrix.runs_on }}-${{ needs.prewarm_snyk_scanner.outputs.opg_actions_ref }}

      - name: Load snyk scanner image
        if: matrix.svc_name != 'mock-sirius' && (steps.existing_image.outputs.exists != 'true' || steps.daily_snyk.outputs.run == 'true' || inputs.branch_name == 'staging')
        env:
          OPG_GITHUB_ACTIONS_REF: ${{ needs.prewarm_snyk_scanner.outputs.opg_actions_ref }}
        run: |
          CACHE_FILE="/tmp/snyk-scanner-cache/snyk-scanner.tar"

          if [ -f "${CACHE_FILE}" ]; then
            docker load -i "${CACHE_FILE}"
          else
            echo "Snyk scanner cache missing, pulling and saving image"

            git clone https://github.com/ministryofjustice/opg-github-actions.git /tmp/opg-github-actions
            cd /tmp/opg-github-actions
            git checkout "${OPG_GITHUB_ACTIONS_REF}"

            docker compose -f "/tmp/opg-github-actions/docker-compose.yml" pull snyk

            mkdir -p /tmp/snyk-scanner-cache

            SNYK_IMAGE="$(docker compose -f "/tmp/opg-github-actions/docker-compose.yml" config | awk '$1 == "image:" {print $2; exit}')"

            echo "Using Snyk image: ${SNYK_IMAGE}"

            docker save -o "${CACHE_FILE}" "${SNYK_IMAGE}"
            docker load -i "${CACHE_FILE}"
          fi

      - name: Run Snyk Scan
        id: snyk_scan
        if: matrix.svc_name != 'mock-sirius' && (steps.existing_image.outputs.exists != 'true' || steps.daily_snyk.outputs.run == 'true' || inputs.branch_name == 'staging')
        uses: ministryofjustice/opg-github-actions/actions/snyk-scan@83663a5235330cc2193319b25d559885610c6bd5 # v4.8.4
        with:
          SNYK_TEST_IMAGE: ${{ matrix.svc_name }}:latest
          SNYK_TOKEN: ${{ secrets.snyk_token }}
          snyk_test_args: "--severity-threshold=high"
          sarif_filepath: ./test-results
          sarif_filename: snyk-results.sarif
          snyk_policy_path: ${{ github.workspace }}/.github/.snyk

      - name: Upload SNYK scan results to GitHub Security tab
        if: steps.snyk_scan.outcome == 'success' && hashFiles('test-results/snyk-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@b8bb9f28b8d3f992092362369c57161b755dea45 # v4.35.0
        with:
          sarif_file: test-results/snyk-results.sarif
          category: ${{ matrix.svc_name }}

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: configure OIDC AWS credentials for ECR push
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: arn:aws:iam::${{ vars.MANAGEMENT_ACCOUNT }}:role/digideps-gh-actions-ecr-push
          role-session-name: github-actions-ecr-push
          role-duration-seconds: 900
          aws-region: eu-west-1

      - uses: aws-actions/amazon-ecr-login@fa648b43de3d4d023bcb3f89ed6940096949c419 # v2.1.5
        id: login_ecr
        with:
          registries: ${{ vars.MANAGEMENT_ACCOUNT }}
          mask-password: "true"

      - name: retag existing scanned image
        if: steps.existing_image.outputs.exists == 'true' && inputs.branch_name != 'staging'
        env:
          IMAGE_NAME: ${{ matrix.svc_name }}
          IMAGE_TAG: ${{ inputs.tag }}
          SOURCE_TAG: ${{ steps.existing_image.outputs.source_tag }}
          BRANCH_CHECKSUM_TAG: ${{ steps.image_checksum.outputs.branch_checksum_tag }}
          BRANCH_NAME: ${{ inputs.branch_name }}
        run: |
          MANIFEST="$(aws ecr batch-get-image \
            --repository-name "digideps/${IMAGE_NAME}" \
            --image-ids imageTag="${SOURCE_TAG}" \
            --query 'images[0].imageManifest' \
            --output text)"

          aws ecr put-image \
            --repository-name "digideps/${IMAGE_NAME}" \
            --image-tag "${IMAGE_TAG}" \
            --image-manifest "${MANIFEST}" \
            >/dev/null

          aws ecr put-image \
            --repository-name "digideps/${IMAGE_NAME}" \
            --image-tag "${BRANCH_CHECKSUM_TAG}" \
            --image-manifest "${MANIFEST}" \
            >/dev/null || true

          if [[ "${BRANCH_NAME}" == "main" ]]; then
            aws ecr put-image \
              --repository-name "digideps/${IMAGE_NAME}" \
              --image-tag "latest" \
              --image-manifest "${MANIFEST}" \
              >/dev/null

            aws ecr put-image \
              --repository-name "digideps/${IMAGE_NAME}" \
              --image-tag "main-${IMAGE_TAG}" \
              --image-manifest "${MANIFEST}" \
              >/dev/null
          fi

      - name: show build tag
        env:
          IMAGE_TAG: ${{ inputs.tag }}
        run: echo "Tag to use - ${IMAGE_TAG}"

      - name: tag and push user research development container
        if: matrix.svc_name == 'client-webserver' && inputs.branch_name == 'main' && steps.existing_image.outputs.exists != 'true'
        env:
          ECR_REGISTRY: ${{ steps.login_ecr.outputs.registry }}
          ECR_REGISTRY_ALIAS: digideps
          IMAGE_TAG: ${{ inputs.tag }}
          IMAGE_NAME: ${{ matrix.svc_name }}
        run: |
          export IMAGE_TAG_DEV="development-${IMAGE_TAG}"
          docker tag "${IMAGE_NAME}:latest" "${ECR_REGISTRY}/${ECR_REGISTRY_ALIAS}/${IMAGE_NAME}:${IMAGE_TAG_DEV}"

      - name: tag and push container
        if: steps.existing_image.outputs.exists != 'true' || inputs.branch_name == 'staging'
        env:
          ECR_REGISTRY: ${{ steps.login_ecr.outputs.registry }}
          ECR_REGISTRY_ALIAS: digideps
          IMAGE_TAG: ${{ inputs.tag }}
          IMAGE_NAME: ${{ matrix.svc_name }}
          BRANCH_NAME: ${{ inputs.branch_name }}
          CHECKSUM_TAG: ${{ steps.image_checksum.outputs.checksum_tag }}
          BRANCH_CHECKSUM_TAG: ${{ steps.image_checksum.outputs.branch_checksum_tag }}
        run: |
          docker tag "${IMAGE_NAME}:latest" "${ECR_REGISTRY}/${ECR_REGISTRY_ALIAS}/${IMAGE_NAME}:${IMAGE_TAG}"
          docker tag "${IMAGE_NAME}:latest" "${ECR_REGISTRY}/${ECR_REGISTRY_ALIAS}/${IMAGE_NAME}:${CHECKSUM_TAG}"
          docker tag "${IMAGE_NAME}:latest" "${ECR_REGISTRY}/${ECR_REGISTRY_ALIAS}/${IMAGE_NAME}:${BRANCH_CHECKSUM_TAG}"
          if [[ "${BRANCH_NAME}" == "main" ]]; then
            docker tag "${IMAGE_NAME}:latest" "${ECR_REGISTRY}/${ECR_REGISTRY_ALIAS}/${IMAGE_NAME}:latest"
            docker tag "${IMAGE_NAME}:latest" "${ECR_REGISTRY}/${ECR_REGISTRY_ALIAS}/${IMAGE_NAME}:main-${IMAGE_TAG}"
          fi
          docker push --all-tags "${ECR_REGISTRY}/${ECR_REGISTRY_ALIAS}/${IMAGE_NAME}"

      - name: Unset AWS variables
        if: always()
        run: |
          {
            echo "AWS_SECRET_ACCESS_KEY="
            echo "AWS_ACCESS_KEY_ID="
            echo "AWS_SESSION_TOKEN="
          } >> "$GITHUB_ENV"
