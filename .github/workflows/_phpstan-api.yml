name: "[Tests] API PHPStan"

defaults:
  run:
    shell: bash

on:
  workflow_call:
    inputs:
      branch_name:
        description: "Name of the branch doing the build"
        required: true
        type: string
jobs:
  api-phpstan:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      #      - name: set up docker buildx
      #        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: cache docker layers
        id: cache-docker
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/.buildx-cache
          key: api-phpstan-${{ inputs.branch_name }}-${{ github.sha }}
          restore-keys: |
            api-phpstan-${{ inputs.branch_name }}
            api-phpstan-main

      - name: build docker images
        run: |
          docker buildx build \
          -f api/docker/app/Dockerfile \
          --cache-from=type=local,src=/tmp/.buildx-cache \
          --cache-to=type=local,dest=/tmp/.buildx-cache-new \
          --build-arg LOCAL_RESOURCES=true \
          --tag api-phpstan:latest \
          --target devtools-admin \
          --output type=docker .

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: run api phpstan
        id: api-phpstan
        run: |
          make phpstan-api
