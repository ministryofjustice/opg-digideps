on:
  workflow_call:
    secrets:
      ssh_private_key:
        required: true
    inputs:
      terraform_path:
        description: "The name of the terraform path"
        required: true
        type: string
      workspace:
        description: "Terraform workspace"
        required: true
        type: string
      container_version:
        description: "Image tag to use"
        required: false
        type: string
        default: ""
      apply:
        description: "Whether to apply terraform"
        required: false
        type: boolean
        default: false
      pull_request_path:
        description: "Called from pull request"
        required: false
        type: boolean
        default: false
      account_name:
        required: true
        type: string
        description: "Account to get credentials for"

jobs:
  terraform_workflow:
    runs-on: ubuntu-latest
    container:
      image: alpine:3.23

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: install alpine dependencies
        run: |
          apk add --no-cache \
          bash \
          git \
          openssh-client \
          curl \
          ca-certificates \
          libc6-compat

      - name: check for sec vulnerabilities
        run: ps -ef

      - name: Set Global SSH Auth Socket
        shell: bash
        run: |
          echo "SSH_AUTH_SOCK=/tmp/ssh_agent.sock" >> "$GITHUB_ENV"

      - name: Create SSH Dir
        shell: bash
        run: |
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"

      - name: Add github.com to known_hosts
        shell: bash
        run: |
          ssh-keyscan -H -t rsa,ed25519 github.com >> "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Force git to use user known_hosts
        shell: bash
        run: |
          git config --global core.sshCommand \
            'ssh -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes'

      - name: Start Agent
        shell: bash
        run: |
          ssh-agent -a "$SSH_AUTH_SOCK" > /dev/null

      - name: Add SSH Key
        shell: bash
        env:
          DEPLOY_KEY: ${{ secrets.ssh_private_key }}
        run: |
          printf '%s\n' "$DEPLOY_KEY" | ssh-add -

      - uses: hashicorp/setup-terraform@b9cd54a3c349d3f38e8881555d616ced269862dd # v3.1.2
        with:
          terraform_version: v1.14.8
          terraform_wrapper: false

      - name: configure OIDC AWS credentials for terraform
        uses: aws-actions/configure-aws-credentials@61815dcd50bd041e203e49132bacad1fd04d2708 # v5.1.1
        with:
          role-to-assume: "arn:aws:iam::${{ vars.IDENTITY_ACCOUNT }}:role/oidc-digideps-${{ inputs.account_name }}"
          role-session-name: github-actions-terraform
          role-duration-seconds: 7400
          aws-region: eu-west-1

      - name: terraform init for account
        if: inputs.terraform_path == 'account'
        run: terraform init -input=false
        env:
          TF_WORKSPACE: ${{ inputs.workspace }}
        working-directory: terraform/${{ inputs.terraform_path }}

      - name: terraform init for environment
        run: terraform init -input=false
        if: inputs.terraform_path == 'environment'
        working-directory: terraform/${{ inputs.terraform_path }}

      - name: terraform apply ${{ inputs.terraform_path }}
        if: inputs.apply
        env:
          TF_WORKSPACE: ${{ inputs.workspace }}
          TF_VAR_OPG_DOCKER_TAG: ${{ inputs.container_version }}
          CI: true
        run: |
          terraform apply -lock-timeout=300s -input=false -auto-approve -parallelism=30
        working-directory: terraform/${{ inputs.terraform_path }}

      - name: Unset AWS variables
        if: always()
        run: |
          {
            echo "AWS_SECRET_ACCESS_KEY="
            echo "AWS_ACCESS_KEY_ID="
            echo "AWS_SESSION_TOKEN="
          } >> "$GITHUB_ENV"
