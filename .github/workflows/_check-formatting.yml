name: "[Style] PHP-CS-Fixer"

on:
  workflow_call:

jobs:
  php-cs-fixer:
    runs-on: ubuntu-26.04
    steps:
      - uses: actions/checkout@c0dbb0f8636d7a4f9cacba34ae5b4a958b4b614c # v20260628.56.1
        with:
          fetch-depth: 0

      - name: Install PHP-CS-Fixer
        run: |
          curl -OL https://github.com/PHP-CS-Fixer/PHP-CS-Fixer/releases/download/v3.95.11/php-cs-fixer.phar
          php php-cs-fixer.phar --version

      - name: Detect changed PHP files
        run: |
          {
            echo "CHANGED_PHP_FILES<<EOF"
            git diff --diff-filter=d --name-only origin/main... -- '**/*.php'
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Run php-cs-fixer
        if: env.CHANGED_PHP_FILES != ''
        run: |
          php php-cs-fixer.phar check --config=.php-cs-fixer.dist.php -v --show-progress=none $CHANGED_PHP_FILES
