name: "[Security] Secret Scan on Push"

on: workflow_call

permissions:
  id-token: write
  contents: read

jobs:
  secret_scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Trivy Secret Scan
        id: trivy_secret_scan
        run: |
          mkdir -p .trivy-cache

          docker run --rm \
            -v "${PWD}:/work:ro" \
            -v "${PWD}/.trivy-cache:/root/.cache/" \
            -w /work \
            aquasec/trivy:latest \
            fs \
            --scanners secret \
            --exit-code 1 \
            --format table \
            --timeout 5m \
            .

  slack_notify_secret_scan_failure:
    name: notify of secret-scan failure
    uses: ./.github/workflows/_slack-notification.yml
    if: ${{ failure() }}
    needs: secret_scan
    with:
      success: no
      branch: ${{ github.ref_name }}
      account: ${{ vars.DEVELOPMENT_ACCOUNT }}
      failure_reason: "Secret Found In PR"
